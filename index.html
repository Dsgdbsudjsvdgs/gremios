<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grêmio Estudantil - Login</title>
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="watermark">Grêmio Estudantil — uso interno</div>
    
    <div class="login-container">
        <div class="login-card fade-in">
            <h2>🖐️ Login Grêmio</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Identifique-se para acessar o sistema</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required maxlength="14">
                </div>
                <div class="input-group">
                    <label for="birth-date">Data de Nascimento</label>
                    <input type="date" id="birth-date" required>
                </div>
                <button type="submit" id="btn-login" class="btn-login">Entrar</button>
            </form>
            <div id="login-error" class="error-msg" style="display:none; color: var(--error-color); margin-top: 20px; font-size: 0.85rem;">
                Dados incorretos. Tente novamente.
            </div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
