<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Grêmio Educa V2</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(12px);
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.6s ease;
        }
        .login-card h2 {
            margin-bottom: 20px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 8px;
            margin-left: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gradient-main);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-login:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }
        .divider {
            margin: 20px 0; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        .divider div {
            flex: 1; 
            height: 1px; 
            background: var(--glass-border);
        }
        .divider span {
            font-size: 0.8rem; 
            color: var(--text-dim);
        }
        .btn-google {
            width: 100%;
            padding: 12px;
            background: white;
            color: #444;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        .btn-google:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="login-card">
            <div class="logo" style="margin-bottom: 30px;">
                <img src="assets/img/logo-da-escola/educa_mais_sem_fundo.svg" alt="Grêmio Educa" style="height: 60px;">
            </div>
            <h2 class="fade-in">Acesso Exclusivo</h2>
            <p class="fade-in" style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 30px; animation-delay: 0.1s;">
                Entre com seus dados para acessar o sistema.
            </p>
            
            <form id="login-form" class="fade-in" style="animation-delay: 0.2s;">
                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>
                <div class="input-group">
                    <label>Data de Nascimento</label>
                    <input type="text" id="data-nasc" placeholder="DD/MM/AAAA" maxlength="10" required>
                </div>
                <button type="submit" class="btn-login">Entrar no Sistema</button>
            </form>

            <div class="divider fade-in" style="animation-delay: 0.3s;">
                <div></div>
                <span>OU</span>
                <div></div>
            </div>

            <button id="google-login" class="btn-google fade-in" style="animation-delay: 0.4s;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 18px; height: 18px; margin-right: 10px;">
                Entrar com Google
            </button>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/mask.js"></script>
    <script type="module" src="assets/js/auth/authService.js"></script>
<script type="module" src="assets/js/auth/loginHandler.js"></script>
    <script src="assets/js/google_auth.js"></script>
</body>
</html>
