<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos de Ação | Grêmio Educa V2</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .plan-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .plan-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .plan-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }
        .plan-title h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .plan-title p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .plan-member-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .plan-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .semester-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }
        .semester-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: var(--text-dim);
            transition: var(--transition);
        }
        .action-item:hover {
            color: var(--text-main);
            transform: translateX(5px);
        }
        .action-check {
            width: 18px;
            height: 18px;
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
            transition: var(--transition);
        }
        .action-check.done {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .plan-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="../assets/img/logo-da-escola/educa_mais_sem_fundo.svg" alt="Grêmio Educa" style="height: 45px;">
            </div>
            <nav class="nav-links">
                <a href="../index.html">Painel</a>
                <a href="cultura.html">Cultura</a>
                <a href="esportes.html">Esportes</a>
                <a href="tecnologia.html">Tecnologia</a>
                <a href="comunicacao.html">Comunicação</a>
                <a href="ouvidoria.html">Ouvidoria</a>
                <a href="perfil.html">Perfil</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="dashboard-title fade-in">Planos de Ação 2026</h1>
        
        <div id="plans-list" class="plan-container">
            <!-- Cards de Planos serão injetados via JS -->
        </div>
    </main>

    <script src="../assets/js/app.js"></script>
    <script src="assets/js/plans.js"></script>
</body>
</html>
