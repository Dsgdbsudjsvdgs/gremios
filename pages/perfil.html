<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Grêmio Educa V2</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .profile-page {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .profile-glass-card {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: var(--glass-shadow);
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        .user-avatar-dynamic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
            transition: var(--transition);
            box-shadow: 0 0 20px var(--user-accent-color);
            background: var(--user-accent-color);
        }
        .user-name {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .user-role {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 25px;
            display: block;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            margin-bottom: 30px;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }
        .info-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 400;
        }
        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 0, 0, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: var(--transition);
        }
        .logout-btn:hover {
            background: rgba(255, 0, 0, 0.2);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="../assets/img/logo-da-escola/educa_mais_sem_fundo.svg" alt="Grêmio Educa" style="height: 45px;">
            </div>
            <nav class="nav-links">
                <a href="../index.html">🏠 Início</a>
                <a href="agenda.html">📅 Agenda</a>
                <a href="atividades.html">📝 Atividades</a>
                <a href="planos.html">🚀 Planos</a>
                <a href="cultura.html">🎨 Cultura</a>
                <a href="esportes.html">⚽ Esportes</a>
                <a href="tecnologia.html">💻 Tecnologia</a>
                <a href="comunicacao.html">📢 Comunicação</a>
                <a href="ouvidoria.html">💡 Ouvidoria</a>
                <a href="perfil.html" class="active">👤 Perfil</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="profile-page">
            <div class="profile-glass-card">
                <div class="user-avatar-dynamic" id="avatar">?</div>
                <h1 class="user-name" id="name">Carregando...</h1>
                <span class="user-role" id="role">Cargo do Membro</span>
                
                <div class="info-grid">
                    <div class="info-box">
                        <span class="info-label">CPF</span>
                        <span class="info-value" id="cpf">---</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Nascimento</span>
                        <span class="info-value" id="birth">---</span>
                    </div>
                </div>

                <button class="logout-btn" onclick="auth.logout()">Sair do Sistema</button>
            </div>
        </div>
    </main>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/profile.js"></script>
</body>
</html>
