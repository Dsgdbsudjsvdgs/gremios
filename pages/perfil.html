<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Grêmio Estudantil</title>
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="watermark">Grêmio Estudantil — uso interno</div>
    
    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="/assets/img/logo.png" alt="Grêmio Logo" onerror="this.src='https://via.placeholder.com/45x45?text=G'">
            </div>
            <a href="/pages/dashboard.html" class="user-badge" style="text-decoration: none; color: white;">← Voltar</a>
        </div>
    </header>

    <main class="container">
        <h1 class="dashboard-title fade-in">Personalizar Perfil</h1>
        
        <div class="card fade-in" style="max-width: 600px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 30px;">
                <div id="profile-pic" style="width: 100px; height: 100px; border-radius: 50%; background: var(--bg-surface); border: 3px solid var(--accent); margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold;">?</div>
                <h2 id="profile-name">Carregando...</h2>
                <span id="profile-role" class="user-badge">Cargo</span>
            </div>

            <form id="profile-form" style="display: flex; flex-direction: column; gap: 20px; text-align: left;">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="edit-name" required>
                </div>
                
                <div class="input-group">
                    <label>Cor do Perfil (Hexadecimal)</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="color" id="edit-color" style="width: 50px; height: 40px; border: none; background: none; cursor: pointer;">
                        <input type="text" id="edit-color-hex" placeholder="#FFFFFF">
                    </div>
                </div>

                <button type="submit" class="btn-login">Salvar Alterações</button>
            </form>
        </div>
    </main>

    <script src="/assets/js/profile.js"></script>
</body>
</html>
