<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda | Grêmio Educa V2</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .agenda-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .calendar-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: var(--glass-shadow);
        }
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .event-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--primary);
            transition: var(--transition);
            cursor: pointer;
        }
        .event-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(10px);
            border-left-color: var(--accent);
        }
        .event-date {
            min-width: 60px;
            text-align: center;
        }
        .event-date .day {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .event-date .month {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .event-info {
            flex: 1;
        }
        .event-info h4 {
            font-size: 1rem;
            margin-bottom: 2px;
        }
        .event-info p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .event-category {
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        /* MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.3s ease;
        }
        .modal-header {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .form-group input, .form-group select {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        .btn-cancel {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: var(--radius-md);
            cursor: pointer;
        }
        .btn-save {
            padding: 10px 20px;
            background: var(--gradient-main);
            border: none;
            color: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
        }
        .btn-add-event {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--gradient-main);
            color: white;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 98, 255, 0.4);
            transition: var(--transition);
            z-index: 1000;
        }
        .btn-add-event:hover {
            transform: scale(1.1) rotate(90deg);
        }
    </style>
</head>
<body style="display: none;" id="body-auth">

    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="../assets/img/logo-da-escola/educa_mais_sem_fundo.svg" alt="Grêmio Educa" style="height: 45px;">
            </div>
            <nav class="nav-links">
                <a href="../index.html">🏠 Início</a>
                <a href="agenda.html" class="active">📅 Agenda</a>
                <a href="atividades.html">📝 Ativ.</a>
                <a href="planos.html">🚀 Planos</a>
                <a href="cultura.html">🎨 Cultura</a>
                <a href="esportes.html">⚽ Esportes</a>
                <a href="tecnologia.html">💻 Tec.</a>
                <a href="comunicacao.html">📢 Comum.</a>
                <a href="ouvidoria.html">💡 Ouvid.</a>
                <a href="perfil.html">👤 Perfil</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="agenda-container">
            <h1 class="dashboard-title fade-in">Calendário de Ações</h1>
            
            <div class="calendar-card fade-in" style="animation-delay: 0.1s;">
                <div id="event-list" class="event-list">
                    <!-- Eventos injetados via JS -->
                </div>
            </div>
        </div>
    </main>

    <button class="btn-add-event" id="open-modal">+</button>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">Novo Evento</div>
            <form id="event-form">
                <div class="form-group">
                    <label>Título do Evento</label>
                    <input type="text" id="event-title" placeholder="Ex: Reunião de Planejamento" required>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="event-date" required>
                </div>
                <div class="form-group">
                    <label>Categoria/Diretoria</label>
                    <select id="event-cat">
                        <option value="Executiva">Executiva</option>
                        <option value="Cultura">Cultura</option>
                        <option value="Esportes">Esportes</option>
                        <option value="Tecnologia">Tecnologia</option>
                        <option value="Comunicação">Comunicação</option>
                        <option value="Ouvidoria">Ouvidoria</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descrição Curta</label>
                    <input type="text" id="event-desc" placeholder="Ex: Alinhamento de metas">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-close">Cancelar</button>
                    <button type="submit" class="btn-save">Salvar Evento</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/agenda.js"></script>
    <script>
        window.onload = () => {
            if (auth.getUser()) {
                document.getElementById('body-auth').style.display = 'block';
            } else {
                window.location.href = '../login.html';
            }
        };
    </script>
</body>
</html>
