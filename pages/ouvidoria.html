<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouvidoria | Grêmio Educa V2</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .ov-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .ov-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.6s ease;
        }
        .ov-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .ov-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ov-input-group label {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .ov-input-group input, .ov-input-group select, .ov-input-group textarea {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }
        .ov-input-group textarea {
            height: 120px;
            resize: none;
        }
        .btn-submit {
            padding: 14px;
            background: var(--gradient-main);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-submit:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }
        .history-section {
            margin-top: 40px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-info h4 {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .history-info p {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="../assets/img/logo-da-escola/educa_mais_sem_fundo.svg" alt="Grêmio Educa" style="height: 45px;">
            </div>
            <nav class="nav-links">
                <a href="../index.html">Painel</a>
                <a href="agenda.html">Agenda</a>
                <a href="atividades.html">Atividades</a>
                <a href="planos.html">Planos</a>
                <a href="cultura.html">Cultura</a>
                <a href="esportes.html">Esportes</a>
                <a href="tecnologia.html">Tecnologia</a>
                <a href="comunicacao.html">Comunicação</a>
                <a href="ouvidoria.html" class="active">Ouvidoria</a>
                <a href="perfil.html">Perfil</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="ov-container">
            <h1 class="dashboard-title fade-in">Ouvidoria do Grêmio</h1>
            
            <div class="ov-card">
                <h3 style="margin-bottom: 20px;">Sua voz importa</h3>
                <form class="ov-form" id="ov-form">
                    <div class="ov-input-group">
                        <label>Tipo de Manifestação</label>
                        <select id="ov-type" required>
                            <option value="">Selecione...</option>
                            <option value="Sugestão">💡 Sugestão</option>
                            <option value="Reclamação">🚩 Reclamação</option>
                            <option value="Elogio">🌟 Elogio</option>
                        </select>
                    </div>
                    <div class="ov-input-group">
                        <label>Mensagem</label>
                        <textarea id="ov-msg" placeholder="Descreva detalhadamente sua mensagem..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Enviar Manifestação</button>
                </form>
            </div>

            <div class="history-section fade-in" style="animation-delay: 0.2s;">
                <h3 style="margin-bottom: 20px;">Manifestações Recentes</h3>
                <div class="history-list" id="ov-history">
                    <div class="history-item">
                        <div class="history-info">
                            <h4>Exemplo de Sugestão</h4>
                            <p>Melhorar a iluminação do pátio central.</p>
                        </div>
                        <span class="status-pill" style="font-size: 0.6rem; padding: 4px 8px; background: var(--primary); border-radius: 10px; color: white;">Lido</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/ouvidoria.js"></script>
</body>
</html>
